# ═══════════════════════════════════════════════════════════════
# Discord Tesla RPC — Docker Compose
#
# Usage:
#   1. Copy .env.example to .env and fill in your credentials
#   2. docker compose up -d
#   3. Open http://<server-ip>:6080 to log into Discord (first run only)
#   4. The RPC service starts automatically after Discord connects
# ═══════════════════════════════════════════════════════════════

services:
  tesla-rpc:
    build: .
    container_name: discord-tesla-rpc
    restart: unless-stopped
    env_file: .env
    ports:
      # noVNC web interface — log into Discord via browser
      - "6080:6080"
      # Tesla OAuth callback — needed for first-time Tesla auth
      - "8888:8888"
    volumes:
      # Persist Discord login across container restarts
      - discord-config:/root/.config/discord
      # Persist Tesla tokens
      - tesla-tokens:/app/data
    # Required for Discord to work in Docker
    shm_size: '512m'
    environment:
      - DISPLAY=:99

volumes:
  discord-config:
  tesla-tokens:
